<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Читець</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --surface2: #1c1c21;
    --border: #2a2a32;
    --accent: #c8a97e;
    --accent2: #7e9bc8;
    --text: #e8e4dc;
    --text-dim: #7a7570;
    --text-muted: #3d3d45;
    --reading: #f0ead8;
    --highlight: rgba(200, 169, 126, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Spectral', Georgia, serif;
    overflow: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 1000; opacity: 0.6;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  /* ─── HEADER ─── */
  .header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
  }

  .logo {
    font-family: 'Spectral', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

  .logo span { color: var(--text-dim); font-style: normal; font-size: 12px; margin-left: 8px; font-family: 'JetBrains Mono', monospace; }

  .header-actions { display: flex; gap: 8px; align-items: center; }

  .icon-btn {
    width: 38px; height: 38px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 8px;
    color: var(--text-dim);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
  }
  .icon-btn:active { transform: scale(0.93); background: var(--surface2); }
  .icon-btn.active { border-color: var(--accent); color: var(--accent); }

  /* ─── VOICE SELECTOR ─── */
  .voice-bar {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
    background: var(--surface);
  }
  .voice-bar::-webkit-scrollbar { display: none; }

  .voice-chip {
    flex-shrink: 0;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    cursor: pointer;
    background: transparent;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .voice-chip:active { transform: scale(0.96); }
  .voice-chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200, 169, 126, 0.08);
  }

  /* ─── TEXT AREA ─── */
  .text-zone {
    flex: 1;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .text-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 24px 24px 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .text-display {
    font-family: 'Spectral', Georgia, serif;
    font-size: 18px;
    line-height: 1.8;
    color: var(--reading);
    letter-spacing: 0.01em;
    font-weight: 300;
    min-height: 100%;
    word-break: break-word;
  }

  .text-display .word {
    display: inline;
    border-radius: 3px;
    transition: background 0.1s, color 0.1s;
    cursor: pointer;
    padding: 0 1px;
  }
  .text-display .word:hover { color: var(--accent); }
  .text-display .word.current {
    background: var(--highlight);
    color: var(--accent);
    border-radius: 4px;
  }

  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text-muted);
    text-align: center;
    padding: 40px;
  }
  .placeholder-icon { font-size: 48px; opacity: 0.4; }
  .placeholder h3 { font-size: 20px; font-weight: 300; font-style: italic; color: var(--text-dim); }
  .placeholder p { font-size: 14px; line-height: 1.6; font-family: 'JetBrains Mono', monospace; }

  .upload-btn-big {
    margin-top: 8px;
    padding: 12px 28px;
    border: 1px solid var(--accent);
    border-radius: 8px;
    background: rgba(200, 169, 126, 0.08);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .upload-btn-big:active { transform: scale(0.97); background: rgba(200, 169, 126, 0.15); }

  /* Progress line */
  .progress-line {
    height: 2px;
    background: var(--surface2);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    width: 0%;
    transition: width 0.3s ease;
  }

  /* ─── CONTROLS ─── */
  .controls {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 20px 20px;
    flex-shrink: 0;
  }

  .speed-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .speed-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .speed-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--accent);
    min-width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--surface);
    box-shadow: 0 0 0 4px rgba(200,169,126,0.15);
  }

  .main-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .ctrl-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .ctrl-btn:active { transform: scale(0.9); }
  .ctrl-btn:hover { border-color: var(--text-dim); color: var(--text); }

  .play-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: var(--bg);
    font-size: 24px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    box-shadow: 0 4px 20px rgba(200, 169, 126, 0.3);
  }
  .play-btn:active { transform: scale(0.92); }
  .play-btn.playing { background: var(--accent2); box-shadow: 0 4px 20px rgba(126, 155, 200, 0.3); }

  /* ─── PANEL (settings / paste) ─── */
  .panel {
    position: fixed; inset: 0;
    background: rgba(13,13,15,0.85);
    backdrop-filter: blur(8px);
    z-index: 500;
    display: flex;
    align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .panel.open { opacity: 1; pointer-events: all; }

  .panel-sheet {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 20px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .panel.open .panel-sheet { transform: translateY(0); }

  .panel-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .panel-title {
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  textarea.paste-area {
    width: 100%;
    height: 200px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--reading);
    font-family: 'Spectral', serif;
    font-size: 15px;
    line-height: 1.6;
    padding: 12px;
    resize: none;
    outline: none;
    margin-bottom: 12px;
  }
  textarea.paste-area:focus { border-color: var(--accent); }

  .panel-actions { display: flex; gap: 10px; }

  .btn-secondary, .btn-primary {
    flex: 1; padding: 12px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
  }
  .btn-primary {
    border: none;
    background: var(--accent);
    color: var(--bg);
    font-weight: 600;
  }
  .btn-secondary:active { transform: scale(0.97); }
  .btn-primary:active { transform: scale(0.97); opacity: 0.9; }

  /* Toast */
  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 20px;
    border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    padding: 6px 20px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .stat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }
  .stat span { color: var(--text-dim); }

  @media (max-height: 650px) {
    .text-display { font-size: 16px; }
    .play-btn { width: 56px; height: 56px; font-size: 20px; }
    .controls { padding: 12px 20px 16px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">Читець <span>v1.0</span></div>
    <div class="header-actions">
      <button class="icon-btn" id="pasteBtn" title="Вставить текст">✏️</button>
      <button class="icon-btn" id="uploadTrigger" title="Открыть TXT">📂</button>
      <input type="file" id="fileInput" accept=".txt" style="display:none">
    </div>
  </div>

  <!-- VOICE BAR -->
  <div class="voice-bar" id="voiceBar">
    <div class="voice-chip" style="color:var(--text-muted);cursor:default;font-size:10px;">ГОЛОС →</div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat">СЛОВА: <span id="wordCount">0</span></div>
    <div class="stat">ПОЗИЦИЯ: <span id="posCount">0</span></div>
    <div class="stat">~МИН: <span id="timeEst">0</span></div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-line"><div class="progress-fill" id="progressFill"></div></div>

  <!-- TEXT -->
  <div class="text-zone">
    <div class="text-scroll" id="textScroll">
      <div id="textDisplay" class="text-display">
        <div class="placeholder">
          <div class="placeholder-icon">📖</div>
          <h3>Загрузите текст</h3>
          <p>Откройте TXT-файл или<br>вставьте текст вручную</p>
          <button class="upload-btn-big" id="uploadBig">Открыть файл</button>
        </div>
      </div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="speed-row">
      <span class="speed-label">СКОРОСТЬ</span>
      <input type="range" id="speedSlider" min="0.5" max="2.5" step="0.05" value="1.0">
      <span class="speed-value" id="speedVal">1.0×</span>
    </div>
    <div class="main-controls">
      <button class="ctrl-btn" id="restartBtn" title="С начала">⏮</button>
      <button class="ctrl-btn" id="backBtn" title="Назад">⏪</button>
      <button class="play-btn" id="playBtn">▶</button>
      <button class="ctrl-btn" id="fwdBtn" title="Вперёд">⏩</button>
      <button class="ctrl-btn" id="stopBtn" title="Стоп">⏹</button>
    </div>
  </div>

</div>

<!-- PASTE PANEL -->
<div class="panel" id="pastePanel">
  <div class="panel-sheet">
    <div class="panel-handle"></div>
    <div class="panel-title">Вставить текст</div>
    <textarea class="paste-area" id="pasteArea" placeholder="Вставьте или напишите текст здесь..."></textarea>
    <div class="panel-actions">
      <button class="btn-secondary" id="cancelPaste">Отмена</button>
      <button class="btn-primary" id="confirmPaste">Загрузить →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────
let words = [];
let currentWordIndex = 0;
let isPlaying = false;
let utterance = null;
let voices = [];
let selectedVoice = null;
let speed = 1.0;
let charOffset = 0; // char position in full text
let fullText = '';

// ─── SPEECH SYNTH CHECK ──────────────────────────────
const synth = window.speechSynthesis || null;

if (!synth) {
  document.body.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;padding:32px;text-align:center;background:#0d0d0f;color:#c8a97e;font-family:Georgia,serif;">
    <div style="font-size:48px;margin-bottom:24px;">⚠️</div>
    <h2 style="font-size:22px;font-weight:300;margin-bottom:12px;">Браузер не підтримує TTS</h2>
    <p style="color:#7a7570;font-size:14px;line-height:1.7;">Відкрийте цей файл у <b style="color:#c8a97e">Chrome</b> або <b style="color:#c8a97e">Edge</b> на Android.<br>Safari та деякі браузери не підтримують Web Speech API.</p>
  </div>`;
  throw new Error('speechSynthesis not supported');
}

// ─── ELEMENTS ────────────────────────────────────────
const playBtn = document.getElementById('playBtn');
const stopBtn = document.getElementById('stopBtn');
const backBtn = document.getElementById('backBtn');
const fwdBtn = document.getElementById('fwdBtn');
const restartBtn = document.getElementById('restartBtn');
const speedSlider = document.getElementById('speedSlider');
const speedVal = document.getElementById('speedVal');
const textDisplay = document.getElementById('textDisplay');
const textScroll = document.getElementById('textScroll');
const progressFill = document.getElementById('progressFill');
const wordCount = document.getElementById('wordCount');
const posCount = document.getElementById('posCount');
const timeEst = document.getElementById('timeEst');
const voiceBar = document.getElementById('voiceBar');
const fileInput = document.getElementById('fileInput');
const pastePanel = document.getElementById('pastePanel');
const pasteArea = document.getElementById('pasteArea');

// ─── VOICES ──────────────────────────────────────────
function loadVoices() {
  voices = synth.getVoices();
  const ruVoices = voices.filter(v =>
    v.lang.startsWith('ru') || v.lang.startsWith('uk') ||
    v.name.toLowerCase().includes('russian') ||
    v.name.toLowerCase().includes('ru-')
  );

  // Keep existing ГОЛОС label
  voiceBar.innerHTML = '<div class="voice-chip" style="color:var(--text-muted);cursor:default;font-size:10px;">ГОЛОС →</div>';

  if (ruVoices.length === 0) {
    // Fallback: show all voices
    const allChip = document.createElement('div');
    allChip.className = 'voice-chip active';
    allChip.textContent = 'Системный';
    voiceBar.appendChild(allChip);
    selectedVoice = voices[0] || null;
    showToast('Рус. голос не найден, используется системный');
  } else {
    ruVoices.forEach((v, i) => {
      const chip = document.createElement('div');
      chip.className = 'voice-chip' + (i === 0 ? ' active' : '');
      chip.textContent = v.name.replace('Google ', '').replace(' (', '\n(').split('\n')[0].substring(0, 18);
      chip.title = v.name + ' · ' + v.lang;
      chip.addEventListener('click', () => {
        document.querySelectorAll('.voice-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        selectedVoice = v;
        if (isPlaying) { stopSpeech(); setTimeout(() => startSpeech(), 100); }
      });
      voiceBar.appendChild(chip);
      if (i === 0) selectedVoice = v;
    });
  }
}

if ('onvoiceschanged' in synth) {
  synth.onvoiceschanged = loadVoices;
}
loadVoices();
setTimeout(loadVoices, 500);
setTimeout(loadVoices, 1500);

// ─── TEXT LOADING ─────────────────────────────────────
function loadText(text) {
  fullText = text.trim();
  if (!fullText) return;

  stopSpeech();
  currentWordIndex = 0;

  // Tokenize keeping punctuation attached to words
  const tokens = fullText.split(/(\s+)/);
  words = [];
  tokens.forEach(t => {
    if (t.trim()) words.push(t.trim());
  });

  renderWords();
  updateStats();
  showToast(`Загружено ${words.length} слов`);
}

function renderWords() {
  textDisplay.innerHTML = '';
  words.forEach((w, i) => {
    const span = document.createElement('span');
    span.className = 'word';
    span.textContent = w + ' ';
    span.dataset.index = i;
    span.addEventListener('click', () => {
      if (isPlaying) stopSpeech();
      currentWordIndex = i;
      highlightWord(i);
      updateStats();
    });
    textDisplay.appendChild(span);
  });
}

function highlightWord(index) {
  document.querySelectorAll('.word.current').forEach(el => el.classList.remove('current'));
  if (index < 0 || index >= words.length) return;
  const el = textDisplay.querySelector(`[data-index="${index}"]`);
  if (!el) return;
  el.classList.add('current');

  // Auto-scroll
  const scrollZone = textScroll;
  const elTop = el.offsetTop;
  const scrollTop = scrollZone.scrollTop;
  const zoneH = scrollZone.clientHeight;
  if (elTop < scrollTop + 80 || elTop > scrollTop + zoneH - 120) {
    scrollZone.scrollTo({ top: elTop - zoneH / 3, behavior: 'smooth' });
  }
  updateProgress(index);
  updateStats(index);
}

function updateProgress(index) {
  const pct = words.length > 1 ? (index / (words.length - 1)) * 100 : 0;
  progressFill.style.width = pct + '%';
}

function updateStats(index) {
  const idx = index !== undefined ? index : currentWordIndex;
  wordCount.textContent = words.length;
  posCount.textContent = idx + 1;
  const wpm = Math.round(130 * speed);
  const remaining = Math.max(0, words.length - idx);
  timeEst.textContent = Math.ceil(remaining / wpm);
}

// ─── SPEECH ───────────────────────────────────────────
function buildChunk(fromIndex) {
  // Speak in chunks of 40 words for better word tracking
  const CHUNK = 40;
  const end = Math.min(fromIndex + CHUNK, words.length);
  return { text: words.slice(fromIndex, end).join(' '), end };
}

let chunkEnd = 0;

function startSpeech() {
  if (!words.length) { showToast('Сначала загрузите текст'); return; }
  if (currentWordIndex >= words.length) currentWordIndex = 0;

  isPlaying = true;
  playBtn.textContent = '⏸';
  playBtn.classList.add('playing');
  speakChunk(currentWordIndex);
}

function speakChunk(fromIdx) {
  if (!isPlaying || fromIdx >= words.length) {
    if (fromIdx >= words.length) finishReading();
    return;
  }

  const { text, end } = buildChunk(fromIdx);
  chunkEnd = end;

  utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = speed;
  utterance.pitch = 1.0;
  utterance.volume = 1.0;
  if (selectedVoice) utterance.voice = selectedVoice;
  utterance.lang = selectedVoice ? selectedVoice.lang : 'ru-RU';

  // Word boundary tracking
  let localWordIdx = 0;
  utterance.onboundary = (e) => {
    if (e.name === 'word') {
      const globalIdx = fromIdx + localWordIdx;
      currentWordIndex = globalIdx;
      highlightWord(globalIdx);
      localWordIdx++;
    }
  };

  utterance.onend = () => {
    if (!isPlaying) return;
    currentWordIndex = chunkEnd;
    speakChunk(chunkEnd);
  };

  utterance.onerror = (e) => {
    if (e.error !== 'interrupted') {
      showToast('Ошибка TTS: ' + e.error);
      stopSpeech();
    }
  };

  synth.speak(utterance);
}

function pauseSpeech() {
  synth.pause();
  isPlaying = false;
  playBtn.textContent = '▶';
  playBtn.classList.remove('playing');
}

function resumeSpeech() {
  isPlaying = true;
  playBtn.textContent = '⏸';
  playBtn.classList.add('playing');
  synth.resume();
  // Fallback: if resume doesn't work well, restart chunk
  setTimeout(() => {
    if (isPlaying && !synth.speaking) speakChunk(currentWordIndex);
  }, 300);
}

function stopSpeech() {
  isPlaying = false;
  synth.cancel();
  playBtn.textContent = '▶';
  playBtn.classList.remove('playing');
}

function finishReading() {
  isPlaying = false;
  playBtn.textContent = '▶';
  playBtn.classList.remove('playing');
  currentWordIndex = 0;
  highlightWord(-1);
  updateProgress(0);
  showToast('Чтение завершено ✓');
}

// ─── CONTROLS ─────────────────────────────────────────
playBtn.addEventListener('click', () => {
  if (!words.length) { showToast('Загрузите текст'); return; }
  if (isPlaying) pauseSpeech();
  else if (synth.paused) resumeSpeech();
  else startSpeech();
});

stopBtn.addEventListener('click', () => {
  stopSpeech();
  currentWordIndex = 0;
  highlightWord(0);
  updateProgress(0);
});

restartBtn.addEventListener('click', () => {
  stopSpeech();
  currentWordIndex = 0;
  highlightWord(0);
  updateProgress(0);
  if (words.length) startSpeech();
});

backBtn.addEventListener('click', () => {
  const wasPlaying = isPlaying;
  stopSpeech();
  currentWordIndex = Math.max(0, currentWordIndex - 20);
  highlightWord(currentWordIndex);
  if (wasPlaying) setTimeout(startSpeech, 100);
});

fwdBtn.addEventListener('click', () => {
  const wasPlaying = isPlaying;
  stopSpeech();
  currentWordIndex = Math.min(words.length - 1, currentWordIndex + 20);
  highlightWord(currentWordIndex);
  if (wasPlaying) setTimeout(startSpeech, 100);
});

speedSlider.addEventListener('input', () => {
  speed = parseFloat(speedSlider.value);
  speedVal.textContent = speed.toFixed(2).replace('.00','').replace(/(\.\d)0/,'$1') + '×';
  updateStats();
  if (isPlaying) { stopSpeech(); setTimeout(startSpeech, 80); }
});

// ─── FILE ─────────────────────────────────────────────
function setupFileUpload(btn) {
  btn.addEventListener('click', () => fileInput.click());
}
setupFileUpload(document.getElementById('uploadTrigger'));
setupFileUpload(document.getElementById('uploadBig'));

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    loadText(ev.target.result);
    fileInput.value = '';
  };
  reader.readAsText(file, 'UTF-8');
});

// ─── PASTE PANEL ──────────────────────────────────────
document.getElementById('pasteBtn').addEventListener('click', () => {
  pastePanel.classList.add('open');
  setTimeout(() => pasteArea.focus(), 300);
});
document.getElementById('cancelPaste').addEventListener('click', () => {
  pastePanel.classList.remove('open');
});
document.getElementById('confirmPaste').addEventListener('click', () => {
  const t = pasteArea.value.trim();
  if (t) { loadText(t); pasteArea.value = ''; }
  pastePanel.classList.remove('open');
});
pastePanel.addEventListener('click', (e) => {
  if (e.target === pastePanel) pastePanel.classList.remove('open');
});

// ─── TOAST ────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── KEYBOARD ─────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') { e.preventDefault(); playBtn.click(); }
  if (e.code === 'ArrowLeft') backBtn.click();
  if (e.code === 'ArrowRight') fwdBtn.click();
  if (e.code === 'Escape') stopBtn.click();
});

// ─── WAKE LOCK (prevent screen sleep while reading) ───
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
  } catch(e) {}
}
document.addEventListener('visibilitychange', async () => {
  if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
});
playBtn.addEventListener('click', requestWakeLock);

// Initial
updateStats();
</script>
</body>
</html>
